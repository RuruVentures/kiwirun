<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥝</text></svg>"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kiwi Run" />
    <meta name="theme-color" content="#0e2415" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Kiwi Run 🥝</title>
    <meta
      name="description"
      content="Help a flightless kiwi outrun possums, rats and a cheeky falcon. Slide, flap, call a buddy — and beat the global top 10. Free, no ads, made in NZ."
    />
    <meta property="og:title" content="Kiwi Run 🥝" />
    <meta
      property="og:description"
      content="A flightless bird. Endless problems. One global top 10. Free, no ads, made in NZ."
    />
    <meta property="og:image" content="https://kiwirun.nz/og.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kiwirun.nz/" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="app"></div>

    <div id="rotate-hint">
      <div>🥝</div>
      <p>Rotate your phone for the best kiwi experience!</p>
    </div>

    <button id="cc-btn" class="hidden">🏁 Cross Country · Multiplayer</button>

    <div id="lobby" class="hidden">
      <div class="lobby-card">
        <section id="lobby-entry">
          <h2>🏁 Cross Country</h2>
          <p class="lobby-sub">Race your friends on the same track!</p>
          <input id="lobby-name" maxlength="12" placeholder="Your name" autocomplete="off" />
          <div class="lobby-joinrow">
            <input id="lobby-code" maxlength="4" placeholder="Secret code" autocomplete="off" />
            <button id="lobby-dice" title="Make up a code">🎲</button>
          </div>
          <p class="lobby-hint">Make up a code to start a race — or type a friend's code to join.</p>
          <button id="lobby-go" class="lobby-primary" disabled>Enter a code</button>
          <p id="lobby-entry-msg" class="lobby-msg"></p>
          <button id="lobby-back" class="lobby-text">Back to game</button>
        </section>

        <section id="lobby-room" class="hidden">
          <h2>Race <span id="lobby-roomcode">····</span></h2>
          <p class="lobby-sub" id="lobby-room-sub"></p>
          <div id="lobby-modes">
            <button class="lobby-mode" data-mode="finish">🏁 Finish line</button>
            <button class="lobby-mode" data-mode="last">💀 Last kiwi</button>
          </div>
          <ul id="lobby-players"></ul>
          <label id="lobby-ready-wrap">
            <input type="checkbox" id="lobby-ready" />
            <span>I'm ready!</span>
          </label>
          <button id="lobby-start" class="lobby-primary hidden">Start race</button>
          <p id="lobby-room-msg" class="lobby-msg"></p>
          <button id="lobby-leave" class="lobby-text">Leave lobby</button>
        </section>

        <section id="lobby-countdown" class="hidden">
          <div id="lobby-count-num">3</div>
        </section>
      </div>
    </div>

    <div id="results" class="hidden">
      <div class="lobby-card">
        <h2>🏆 Results</h2>
        <ol id="results-list"></ol>
        <button id="results-cert" class="lobby-primary">🎓 My certificate</button>
        <button id="results-again" class="lobby-text">Play again</button>
      </div>
    </div>

    <div id="cert" class="hidden">
      <div class="cert-card">
        <img id="cert-img" alt="Your certificate" />
        <div class="cert-row">
          <button id="cert-share" class="lobby-primary">📤 Share / Save</button>
          <button id="cert-back" class="lobby-text">Back</button>
        </div>
      </div>
    </div>

    <div id="name-entry" class="hidden">
      <div class="ne-card">
        <h2>🏆 GLOBAL TOP 10!</h2>
        <p id="ne-score"></p>
        <input id="ne-name" maxlength="12" placeholder="Your name" autocomplete="off" />
        <div class="ne-row">
          <button id="ne-save">Save score</button>
          <button id="ne-skip">Skip</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
