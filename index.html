<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥝</text></svg>"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0e2415" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Kiwi Run 🥝</title>
    <meta
      name="description"
      content="Help a flightless kiwi outrun possums, rats and a cheeky falcon. Slide, flap, call a buddy — and beat the global top 10. Free, no ads, made in NZ."
    />
    <meta property="og:title" content="Kiwi Run 🥝" />
    <meta
      property="og:description"
      content="A flightless bird. Endless problems. One global top 10. Free, no ads, made in NZ."
    />
    <meta property="og:image" content="https://kiwirun.nz/og.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kiwirun.nz/" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="app"></div>

    <div id="rotate-hint">
      <div>🥝</div>
      <p>Rotate your phone for the best kiwi experience!</p>
    </div>

    <div id="name-entry" class="hidden">
      <div class="ne-card">
        <h2>🏆 GLOBAL TOP 10!</h2>
        <p id="ne-score"></p>
        <input id="ne-name" maxlength="12" placeholder="Your name" autocomplete="off" />
        <div class="ne-row">
          <button id="ne-save">Save score</button>
          <button id="ne-skip">Skip</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
